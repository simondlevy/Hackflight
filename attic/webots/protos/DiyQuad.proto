PROTO DiyQuad [
  field SFColor frame_color  0 0 0
  field SFVec3f translation 0 0 0.0
  field SFRotation rotation 0 0 0 0
  field SFVec3f motor1_translation  0.031 -0.031 0.016  
  field SFVec3f motor2_translation -0.031 -0.031 0.016  
  field SFVec3f motor3_translation -0.031  0.031 0.016  
  field SFVec3f motor4_translation  0.031  0.031 0.016  
  field SFColor rear_prop_color  0.5 0 0.25
  field SFColor front_prop_color 0.1 0.1 0.1
  field SFFloat prop_fast_helix_radius 0.025
  field SFFloat prop_fast_helix_height 0.001
  field SFFloat prop_fast_helix_threshold 50
  field SFFloat motor_max_velocity 100
  field SFFloat motor_max_torque 30
]

{

DEF ROBOT Robot {

        translation  IS translation
        rotation IS rotation
        controller "<extern>"
        supervisor TRUE
        name "DiyQuad"
        model "DiyQuad"
        children [
        DEF BODY Pose {
            translation 0 0 0

                children [

                    Shape {

                        appearance DEF PLASTIC PBRAppearance {
                            baseColor IS frame_color
                            metalness 0
                        }

                      geometry Mesh {
                          url [ "../meshes/stl_files/diyquad/apex2-frame.stl" ]
                      }
 
                    #CadShape {
                    #    url [ "../meshes/collada_files/diyquad.dae" ]
                    #}
                  }

                ]
        }

      DEF emitter Emitter {
        model "radio"
        bufferSize 1000
      }

      Receiver {
        bufferSize 1000
      }

    Camera {
        translation 0.05 0 0.01
        fieldOfView 0.87
        width 324
        height 324
    }

    RangeFinder {

      # VL53L5 specs
      fieldOfView 1.34  # radians
      width 8 
      height 1
      minRange 0.01
      maxRange 4.0
      noise 0.0 # should probably adjust this
      translation 0.04 0 0.0
      rotation 0 0 1 0
      name "VL53L5-forward"
    }

    RangeFinder {

    # VL13L1 specs
      fieldOfView 0.47  # radians
      width 1 
      height 1
      minRange 0.04
      maxRange 4.0
      noise 0.0 # should probably adjust this
      translation 0.04 0 0.0
      rotation 0 0 1 0
       name "VL53L1-forward"
    }

    RangeFinder {

      # VL13L1 specs
      fieldOfView 0.47  # radians
      width 1 
      height 1
      minRange 0.04
      maxRange 4.0
      noise 0.0 # should probably adjust this
      translation 0.04 0 0.0
      rotation 0 0 1 3.14
      name "VL53L1-backward"
    }

    GPS { # For obtaining initial location
    }
 
    DEF INERTIAL_UNIT InertialUnit {
    }

    # Motor 1 ----------------------------------------------------------------

    DEF M1 Propeller {
        shaftAxis 0 0 1
            centerOfThrust IS motor1_translation
            thrustConstants 0 0
            torqueConstants 0 0
            fastHelixThreshold IS prop_fast_helix_threshold
            device RotationalMotor {
                name "motor1"
                maxVelocity IS motor_max_velocity
                maxTorque IS motor_max_torque
            }
        fastHelix Solid {

            translation IS motor1_translation 

                children [ 

                Shape {
                            appearance PBRAppearance {
                                baseColor IS front_prop_color
                                    baseColorMap ImageTexture {
                                        url [ "../meshes/textures/fast_helix.png" ]
                                    }
                                metalness 0
                            }
                            geometry Cylinder {
                                height IS prop_fast_helix_height
                                radius IS prop_fast_helix_radius
                            }
                        }

                ]
        }
        slowHelix Solid {
            translation IS motor1_translation

                children [

                    Shape {

                        appearance DEF PLASTIC PBRAppearance {
                            baseColor IS front_prop_color
                                metalness 0
                        }

                      geometry Mesh {
                          url [ "../meshes/stl_files//diyquad/prop_cw.stl" ]
                      }
                    }


                ]
        }
    }

     # Motor 2 ----------------------------------------------------------------

    DEF M2 Propeller {
        shaftAxis 0 0 1
            centerOfThrust IS motor2_translation
            thrustConstants 0 0
            torqueConstants 0 0
            fastHelixThreshold IS prop_fast_helix_threshold
            device RotationalMotor {
                name "motor2"
                maxVelocity IS motor_max_velocity
                maxTorque IS motor_max_torque
            }
        fastHelix Solid {

            translation IS motor2_translation

                children [ 

                    Shape {
                            appearance PBRAppearance {
                                baseColor IS rear_prop_color
                                    baseColorMap ImageTexture {
                                        url [ "../meshes/textures/fast_helix.png" ]
                                    }
                                metalness 0
                            }
                            geometry Cylinder {
                                height IS prop_fast_helix_height
                                radius IS prop_fast_helix_radius
                            }
                        }

                ]
        }
        slowHelix Solid {

            translation IS motor2_translation

                children [

                    Shape {

                        appearance DEF PLASTIC PBRAppearance {
                            baseColor IS rear_prop_color
                            metalness 0
                        }

                      geometry Mesh {
                          url [ "../meshes/stl_files//diyquad/prop_ccw.stl" ]
                      }
                    }

                ]
        }
    }

   # Motor 3 ----------------------------------------------------------------

    DEF M3 Propeller {
        shaftAxis 0 0 1
            centerOfThrust IS motor3_translation
            thrustConstants 0 0
            torqueConstants  0 0
            fastHelixThreshold IS prop_fast_helix_threshold
            device RotationalMotor {
                name "motor3"
                maxVelocity IS motor_max_velocity
                maxTorque IS motor_max_torque
            }
        fastHelix Solid {
            translation IS motor3_translation
                children [ 
                  
                Shape {
                            appearance PBRAppearance {
                                baseColor IS rear_prop_color
                                    baseColorMap ImageTexture {
                                        url [
                                            "../meshes/textures/fast_helix.png"
                                        ]
                                    }
                                metalness 0
                            }
                            geometry Cylinder {
                                height IS prop_fast_helix_height
                                radius IS prop_fast_helix_radius
                            }
                        }

                ]
        }
        slowHelix Solid {
            translation IS motor3_translation
                children [

                    Shape {

                        appearance DEF PLASTIC PBRAppearance {
                            baseColor IS rear_prop_color
                                metalness 0
                        }

                      geometry Mesh {
                          url [ "../meshes/stl_files//diyquad/prop_ccw.stl" ]
                      }
                    }

                ]
        }
    }

    # Motor 4 ----------------------------------------------------------------

    DEF M4 Propeller {
        shaftAxis 0 0 1
            centerOfThrust IS motor4_translation
            thrustConstants 0 0
            torqueConstants 0 0
            fastHelixThreshold IS prop_fast_helix_threshold
            device RotationalMotor {
                name "motor4"
                maxVelocity IS motor_max_velocity
                maxTorque IS motor_max_torque
            }
        fastHelix Solid {
            translation IS motor4_translation
                children [

                Shape {
                            appearance PBRAppearance {
                                baseColor IS front_prop_color
                                    baseColorMap ImageTexture {
                                        url [
                                            "../meshes/textures/fast_helix.png"
                                        ]
                                    }
                                metalness 0
                            }
                            geometry Cylinder {
                                height IS prop_fast_helix_height
                                radius IS prop_fast_helix_radius
                            }
                        }

              
                ] 
        }
        slowHelix DEF PROP Solid {
            translation IS motor4_translation
                children [

                    Shape {

                        appearance DEF PLASTIC PBRAppearance {
                            baseColor IS front_prop_color
                                metalness 0
                        }

                      geometry Mesh {
                          url [ "../meshes/stl_files//diyquad/prop_cw.stl" ]
                      }
                    }

                ]
        }
    }
    ]
        boundingObject Cylinder {
            height 0.03
                radius 0.05
        }
    physics Physics {
        density -1
        mass 0.05
    }
}

}
