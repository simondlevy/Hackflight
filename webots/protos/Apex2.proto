PROTO Apex2 [

    field SFColor frame_color  0 0 0
    field SFFloat frame_metalness 0.0
    field SFVec3f frame_translation 0 0 0.014
    field SFRotation frame_rotation 0 0 1 0

    field SFVec3f standoff1_translation -0.030 -0.008 0.000
    field SFVec3f standoff2_translation  0.022 -0.008 0.000
    field SFVec3f standoff3_translation -0.030  0.008 0.000
    field SFVec3f standoff4_translation  0.022  0.008 0.000

    field SFVec3f top_translation 0.002 -0.002 0.015

    field SFVec3f battery_translation  0.000 -0.002 0.016
    field SFColor battery_color  0 0 0.5

    field SFVec3f rubber_band_rear_translation  0.006 -0.0015 0.016
    field SFVec3f rubber_band_front_translation 0.029 -0.0015 0.016
    field SFColor rubber_band_color  0.5 0.5 0

    field SFColor fc_color  0.000 0.176 0.016
    field SFFloat fc_metalness 0.0
    field SFVec3f fc_translation 0.002 0.001 0.001

    field SFVec3f leg1_translation   -0.029 -0.038 -0.013
    field SFVec3f motor_right_rear_cw_translation -0.028 -0.041  0.001
    field SFVec3f prop1_translation  -0.028 -0.041  0.012

    field SFVec3f leg2_translation   0.029 -0.038 -0.013
    field SFVec3f motor_right_front_ccw_translation 0.028 -0.041  0.001
    field SFVec3f prop2_translation  0.028 -0.041  0.012

    field SFVec3f leg3_translation   -0.029 0.046 -0.013
    field SFVec3f motor_left_rear_ccw_translation -0.028 0.044  0.001
    field SFVec3f prop3_translation  -0.028 0.043  0.012

    field SFVec3f leg4_translation   0.031 0.045 -0.013
    field SFVec3f motor_left_front_cw_translation 0.028 0.043 0.001
    field SFVec3f prop4_translation  0.028 0.041 0.012

    field SFColor rear_prop_color  0.5 0 0.25
    field SFColor front_prop_color 0.1 0.1 0.1

    field SFFloat prop_fast_helix_radius 0.025
    field SFFloat prop_fast_helix_height 0.001
    field SFFloat prop_fast_helix_threshold 50

    field SFFloat motor_max_velocity 100
    field SFFloat motor_max_torque 30

    field SFColor motor_color 0.8 0.0 0.0
    field SFFloat motor_metalness 0.9
    ]

{

    DEF robot Robot {

            translation  IS frame_translation
            rotation  IS frame_rotation
            controller "<extern>"
            supervisor TRUE
            children [
            DEF BODY Pose {
                translation 0 0 0

                    children [

                    Shape {

                        appearance DEF PLASTIC PBRAppearance {
                            baseColor IS frame_color
                                metalness IS frame_metalness
                        }

                        geometry Mesh {
                            url [ "../meshes/stl_files/apex2/apex2-frame.stl" ]
                        }
                    }
                    ]
            }

        DEF emitter Emitter {
            model "radio"
                bufferSize 1000
        }

        Receiver {
            bufferSize 1000
        }

        Camera {
            translation 0.05 0 0.01
                fieldOfView 0.87
                width 324
                height 324
        }

        RangeFinder {

            # VL53L5 specs
            fieldOfView 1.34  # radians
                width 8 
                height 1
                minRange 0.01
                maxRange 4.0
                noise 0.0 # should probably adjust this
                translation 0.04 0 0.0
                rotation 0 0 1 0
                name "VL53L5-forward"
        }

        RangeFinder {

            # VL13L1 specs
            fieldOfView 0.47  # radians
                width 1 
                height 1
                minRange 0.04
                maxRange 4.0
                noise 0.0 # should probably adjust this
                translation 0.04 0 0.0
                rotation 0 0 1 0
                name "VL53L1-forward"
        }

        RangeFinder {

            # VL13L1 specs
            fieldOfView 0.47  # radians
                width 1 
                height 1
                minRange 0.04
                maxRange 4.0
                noise 0.0 # should probably adjust this
                translation 0.04 0 0.0
                rotation 0 0 1 3.14
                name "VL53L1-backward"
        }

        GPS { # For obtaining initial location
        }

        DEF INERTIAL_UNIT InertialUnit {
        }

        DEF FC Solid {
            translation IS fc_translation
                name "fc"
                children [
                Shape {
                    appearance PBRAppearance {
                        baseColor IS fc_color
                            metalness IS fc_metalness
                    }
                    geometry Mesh {
                        url [ "../meshes/stl_files/apex2/fc.stl" ]
                    }
                }
                ] 
        }

        DEF STANDOFF1 Solid {
            translation IS standoff1_translation 
                rotation 0 0 1 0
                name "standoff1"
                children [
                Shape {
                    appearance PBRAppearance {
                        baseColor IS frame_color
                            metalness IS frame_metalness
                    }
                    geometry Mesh {
                        url [ "../meshes/stl_files/apex2/standoff.stl" ]
                    }
                }
                ] 
        }

        DEF STANDOFF2 Solid {
            translation IS standoff2_translation 
                rotation 0 0 1 0
                name "standoff2"
                children [
                Shape {
                    appearance PBRAppearance {
                        baseColor IS frame_color
                            metalness IS frame_metalness
                    }
                    geometry Mesh {
                        url [ "../meshes/stl_files/apex2/standoff.stl" ]
                    }
                }
                ] 
        }

        DEF STANDOFF3 Solid {
            translation IS standoff3_translation 
                rotation 0 0 1 0
                name "standoff3"
                children [
                Shape {
                    appearance PBRAppearance {
                        baseColor IS frame_color
                            metalness IS frame_metalness
                    }
                    geometry Mesh {
                        url [ "../meshes/stl_files/apex2/standoff.stl" ]
                    }
                }
                ] 
        }

        DEF STANDOFF4 Solid {
            translation IS standoff4_translation 
                rotation 0 0 1 0
                name "standoff4"
                children [
                Shape {
                    appearance PBRAppearance {
                        baseColor IS frame_color
                            metalness IS frame_metalness
                    }
                    geometry Mesh {
                        url [ "../meshes/stl_files/apex2/standoff.stl" ]
                    }
                }
                ] 
        }

        DEF TOP Solid {
            translation IS top_translation
                name "top"
                children [
                Shape {
                    appearance PBRAppearance {
                        baseColor IS frame_color
                            metalness IS frame_metalness
                    }
                    geometry Mesh {
                        url [ "../meshes/stl_files/apex2/top.stl" ]
                    }
                }
                ] 
        }

        DEF BATTERY Solid {
            translation IS battery_translation
                name "battery"
                children [
                Shape {
                    appearance PBRAppearance {
                        baseColor IS battery_color
                            metalness IS frame_metalness
                    }
                    geometry Mesh {
                        url [ "../meshes/stl_files/apex2/battery.stl" ]
                    }
                }
                ] 
        }

        DEF RUBBER_BAND1 Solid {
            translation IS rubber_band_rear_translation
                name "rubber_band_rear"
                children [
                Shape {
                    appearance PBRAppearance {
                        baseColor IS rubber_band_color
                            metalness IS frame_metalness
                    }
                    geometry Mesh {
                        url [ "../meshes/stl_files/apex2/rubber-band.stl" ]
                    }
                }
                ] 
        }

        DEF RUBBER_BAND2 Solid {
            translation IS rubber_band_front_translation
                name "rubber_band_front"
                children [
                Shape {
                    appearance PBRAppearance {
                        baseColor IS rubber_band_color
                            metalness IS frame_metalness
                    }
                    geometry Mesh {
                        url [ "../meshes/stl_files/apex2/rubber-band.stl" ]
                    }
                }
                ] 
        }

        # Motor 1 ----------------------------------------------------------------

        DEF LEG1 Solid {
            translation IS leg1_translation
                name "leg1"
                children [
                Shape {
                    appearance PBRAppearance {
                        baseColor IS frame_color
                            metalness IS frame_metalness
                    }
                    geometry Mesh {
                        url [ "../meshes/stl_files/apex2/leg.stl" ]
                    }
                }
                ] 
        }

        DEF MOTOR1 Solid {
            translation IS motor_right_rear_cw_translation
                name "motor_right_rear_cw"
                children [
                Shape {
                    appearance PBRAppearance {
                        baseColor IS motor_color
                            metalness IS motor_metalness
                    }
                    geometry Mesh {
                        url [ "../meshes/stl_files/apex2/motor.stl" ]
                    }
                }
                ] 
        }


        DEF PROP1 Propeller {
            shaftAxis 0 0 1
                centerOfThrust IS prop1_translation
                thrustConstants 0 0
                torqueConstants 0 0
                fastHelixThreshold IS prop_fast_helix_threshold
                device RotationalMotor {
                    name "motor_right_rear_cw"
                        maxVelocity IS motor_max_velocity
                        maxTorque IS motor_max_torque
                }
            fastHelix Solid {

                translation IS prop1_translation 

                    children [ 

                    Shape {
                        appearance PBRAppearance {
                            baseColor IS rear_prop_color
                                baseColorMap ImageTexture {
                                    url [ "../meshes/textures/fast_helix.png" ]
                                }
                            metalness 0
                        }
                        geometry Cylinder {
                            height IS prop_fast_helix_height
                                radius IS prop_fast_helix_radius
                        }
                    }

                    ]
            }
            slowHelix Solid {

                translation IS prop1_translation

                    children [

                    Shape {

                        appearance DEF PLASTIC PBRAppearance {
                            baseColor IS rear_prop_color
                                metalness 0
                        }

                        geometry Mesh {
                            url [ "../meshes/stl_files//apex2/prop_cw.stl" ]
                        }
                    }


                    ]
            }
        }

        # Motor 2 ----------------------------------------------------------------

        DEF LEG2 Solid {
            translation IS leg2_translation
                name "leg2"
                children [
                Shape {
                    appearance PBRAppearance {
                        baseColor IS frame_color
                            metalness IS frame_metalness
                    }
                    geometry Mesh {
                        url [ "../meshes/stl_files/apex2/leg.stl" ]
                    }
                }
                ] 
        }

        DEF MOTOR2 Solid {
            translation IS motor_right_front_ccw_translation
                name "motor_right_front_ccw"
                children [
                Shape {
                    appearance PBRAppearance {
                        baseColor IS motor_color
                            metalness IS motor_metalness
                    }
                    geometry Mesh {
                        url [ "../meshes/stl_files/apex2/motor.stl" ]
                    }
                }
                ] 
        }


        DEF PROP2 Propeller {
            shaftAxis 0 0 1
                centerOfThrust IS prop2_translation
                thrustConstants 0 0
                torqueConstants 0 0
                fastHelixThreshold IS prop_fast_helix_threshold
                device RotationalMotor {
                    name "motor_right_front_ccw"
                        maxVelocity IS motor_max_velocity
                        maxTorque IS motor_max_torque
                }
            fastHelix Solid {

                translation IS prop2_translation 

                    children [ 

                    Shape {
                        appearance PBRAppearance {
                            baseColor IS front_prop_color
                                baseColorMap ImageTexture {
                                    url [ "../meshes/textures/fast_helix.png" ]
                                }
                            metalness 0
                        }
                        geometry Cylinder {
                            height IS prop_fast_helix_height
                                radius IS prop_fast_helix_radius
                        }
                    }

                    ]
            }
            slowHelix Solid {

                translation IS prop2_translation

                    children [

                    Shape {

                        appearance DEF PLASTIC PBRAppearance {
                            baseColor IS front_prop_color
                                metalness 0
                        }

                        geometry Mesh {
                            url [ "../meshes/stl_files//apex2/prop_cw.stl" ]
                        }
                    }


                    ]
            }
        }


        # Motor 3 ----------------------------------------------------------------

        DEF LEG3 Solid {
            translation IS leg3_translation
                name "leg3"
                children [
                Shape {
                    appearance PBRAppearance {
                        baseColor IS frame_color
                            metalness IS frame_metalness
                    }
                    geometry Mesh {
                        url [ "../meshes/stl_files/apex2/leg.stl" ]
                    }
                }
                ] 
        }

        DEF MOTOR3 Solid {
            translation IS motor_left_rear_ccw_translation
                name "motor_left_rear_ccw"
                children [
                Shape {
                    appearance PBRAppearance {
                        baseColor IS motor_color
                            metalness IS motor_metalness
                    }
                    geometry Mesh {
                        url [ "../meshes/stl_files/apex2/motor.stl" ]
                    }
                }
                ] 
        }


        DEF PROP3 Propeller {
            shaftAxis 0 0 1
                centerOfThrust IS prop3_translation
                thrustConstants 0 0
                torqueConstants 0 0
                fastHelixThreshold IS prop_fast_helix_threshold
                device RotationalMotor {
                    name "motor_left_rear_ccw"
                        maxVelocity IS motor_max_velocity
                        maxTorque IS motor_max_torque
                }
            fastHelix Solid {

                translation IS prop3_translation 

                    children [ 

                    Shape {
                        appearance PBRAppearance {
                            baseColor IS rear_prop_color
                                baseColorMap ImageTexture {
                                    url [ "../meshes/textures/fast_helix.png" ]
                                }
                            metalness 0
                        }
                        geometry Cylinder {
                            height IS prop_fast_helix_height
                                radius IS prop_fast_helix_radius
                        }
                    }

                    ]
            }
            slowHelix Solid {

                translation IS prop3_translation

                    children [

                    Shape {

                        appearance DEF PLASTIC PBRAppearance {
                            baseColor IS rear_prop_color
                                metalness 0
                        }

                        geometry Mesh {
                            url [ "../meshes/stl_files//apex2/prop_cw.stl" ]
                        }
                    }


                    ]
            }
        }


        # Motor 4 ----------------------------------------------------------------

        DEF LEG4 Solid {
            translation IS leg4_translation
                name "leg4"
                children [
                Shape {
                    appearance PBRAppearance {
                        baseColor IS frame_color
                            metalness IS frame_metalness
                    }
                    geometry Mesh {
                        url [ "../meshes/stl_files/apex2/leg.stl" ]
                    }
                }
                ] 
        }


        DEF MOTOR4 Solid {
            translation IS motor_left_front_cw_translation
                name "motor_left_front_cw"
                children [
                Shape {
                    appearance PBRAppearance {
                        baseColor IS motor_color
                            metalness IS motor_metalness
                    }
                    geometry Mesh {
                        url [ "../meshes/stl_files/apex2/motor.stl" ]
                    }
                }
                ] 
        }


        DEF PROP4 Propeller {
            shaftAxis 0 0 1
                centerOfThrust IS prop4_translation
                thrustConstants 0 0
                torqueConstants 0 0
                fastHelixThreshold IS prop_fast_helix_threshold
                device RotationalMotor {
                    name "motor_left_front_cw"
                        maxVelocity IS motor_max_velocity
                        maxTorque IS motor_max_torque
                }
            fastHelix Solid {

                translation IS prop4_translation 

                    children [ 

                    Shape {
                        appearance PBRAppearance {
                            baseColor IS front_prop_color
                                baseColorMap ImageTexture {
                                    url [ "../meshes/textures/fast_helix.png" ]
                                }
                            metalness 0
                        }
                        geometry Cylinder {
                            height IS prop_fast_helix_height
                                radius IS prop_fast_helix_radius
                        }
                    }

                    ]
            }
            slowHelix Solid {

                translation IS prop4_translation

                    children [

                    Shape {

                        appearance DEF PLASTIC PBRAppearance {
                            baseColor IS front_prop_color
                                metalness 0
                        }

                        geometry Mesh {
                            url [ "../meshes/stl_files//apex2/prop_cw.stl" ]
                        }
                    }


                    ]
            }
        }

        ]

            boundingObject Cylinder {
                height 0.03
                    radius 0.05
            }

        physics Physics {
            density -1
                mass 0.05
        }
    }

}
