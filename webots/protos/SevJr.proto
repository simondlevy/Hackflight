PROTO SevJr [

  field SFColor body_color  0 0 0

  field SFVec3f logo_translation  0.080 -0.030 0.050
  field SFColor logo_color  1 1 1

  field SFVec3f motor_front_left_translation 0.200 0.225 0.035
  field SFVec3f prop_front_left_translation  0.200 0.225 0.075

  field SFVec3f motor_front_right_translation 0.200 -0.290  0.035
  field SFVec3f prop_front_right_translation  0.200 -0.290  0.075

  field SFVec3f motor_rear_translation -0.240 -0.035 0.038
  field SFVec3f prop_rear_translation  -0.240 -0.035 0.078

  field SFRotation prop_front_right_rotation  0 0 1  1

  field SFRotation prop_front_left_rotation  0 0 1 -1

  field SFRotation prop_rear_rotation  0 0 1 0

  field SFColor motor_color 0.8 0.0 0.0
  field SFFloat motor_metalness 0.9

  field SFVec3f rudder_translation -0.350 0.050 0.110
  field SFRotation rudder_rotation  0 1 0 1.578
  field SFColor rudder_color  0.8 0.0 0.0

  field SFFloat prop_fast_helix_radius 0.25
  field SFFloat prop_fast_helix_height 0.01
  field SFFloat prop_fast_helix_threshold 50
  field SFFloat motor_max_velocity 100
  field SFFloat motor_max_torque 30
  field SFColor prop_color  0.4 0.4 0.4
]

{
    DEF ROBOT Robot {

            rotation 0 0 0 0
            controller "<extern>"
            supervisor TRUE
            name "SevJr"
            model "SevJr"

            children [ # =========================================================

            DEF BODY Pose {

                children [

                    Shape {

                      appearance DEF PLASTIC PBRAppearance {
                          baseColor IS body_color
                          metalness 0
                      }

                      geometry Mesh {
                        url [ "../meshes/stl_files/sevjr/body.stl" ]
                      }
                    
                    }
                ]
              }

              DEF LOGO Solid {
                translation IS logo_translation
                children [
                  Shape {
                    appearance PBRAppearance {
                    baseColor IS logo_color
                    metalness 0
                  }
                    geometry Mesh {
                      url [ "../meshes/stl_files/sevjr/logo.stl" ]
                    }
                  }
                ] 
              }

              DEF emitter Emitter {
                model "radio"
                bufferSize 1000
              }

              Receiver {
                bufferSize 1000
              }

            Camera {
                translation 0.05 0 0.01
                fieldOfView 0.87
                width 324
                height 324
            }

            RangeFinder {

              # VL53L5 specs
              fieldOfView 1.34  # radians
              width 8 
              height 1
              minRange 0.01
              maxRange 4.0
              noise 0.0 # should probably adjust this
              translation 0.04 0 0.0
              rotation 0 0 1 0
              name "VL53L5-forward"
            }

            RangeFinder {

              # VL13L1 specs
              fieldOfView 0.47  # radians
              width 1 
              height 1
              minRange 0.04
              maxRange 4.0
              noise 0.0 # should probably adjust this
              translation 0.04 0 0.0
              rotation 0 0 1 0
               name "VL53L1-forward"
            }

            RangeFinder {

              # VL13L1 specs
              fieldOfView 0.47  # radians
              width 1 
              height 1
              minRange 0.04
              maxRange 4.0
              noise 0.0 # should probably adjust this
              translation 0.04 0 0.0
              rotation 0 0 1 3.14
              name "VL53L1-backward"
            }

            GPS { # For obtaining initial location
            }
         
            DEF INERTIAL_UNIT InertialUnit {
            }

            # Propeller Front Right ----------------------------------------------------

              DEF MOTOR_FRONT_RIGHT Solid {
                translation IS motor_front_right_translation
                name "motor_front_right"
                children [
                  Shape {
                    appearance PBRAppearance {
                    baseColor IS motor_color
                    metalness IS motor_metalness
                  }
                    geometry Mesh {
                      url [ "../meshes/stl_files/sevjr/motor.stl" ]
                    }
                  }
                ] 
              }

            DEF FRONT_RIGHT Propeller {
                shaftAxis 0 0 1
                    centerOfThrust IS prop_front_right_translation
                    thrustConstants 0 0
                    torqueConstants 0 0
                    fastHelixThreshold IS prop_fast_helix_threshold
                    device RotationalMotor {
                        name "prop_front_right"
                        maxVelocity IS motor_max_velocity
                        maxTorque IS motor_max_torque
                    }
                fastHelix Solid {
                    translation IS prop_front_right_translation
                        children [

                        Shape {
                                    appearance PBRAppearance {
                                        baseColor IS prop_color
                                            baseColorMap ImageTexture {
                                                url [
                                                    "../meshes/textures/fast_helix.png"
                                                ]
                                            }
                                        metalness 0
                                    }
                                    geometry Cylinder {
                                        height IS prop_fast_helix_height
                                        radius IS prop_fast_helix_radius
                                    }
                                }

                      
                        ] 
                }
                slowHelix DEF PROP Solid {
                    translation IS prop_front_right_translation
                    rotation IS prop_front_right_rotation
                        children [

                            Shape {

                                appearance DEF PLASTIC PBRAppearance {
                                    baseColor IS prop_color
                                        metalness 0
                                }

                              geometry Mesh {
                                  url [ "../meshes/stl_files/sevjr/prop.stl" ]
                              }
                            }

                        ]
                }
            }

            # Propeller Front Left ------------------------------------------------------

              DEF MOTOR_FRONT_LEFT Solid {
                translation IS motor_front_left_translation
                name "motor_front_left"
                children [
                  Shape {
                    appearance PBRAppearance {
                    baseColor IS motor_color
                    metalness IS motor_metalness
                  }
                    geometry Mesh {
                      url [ "../meshes/stl_files/sevjr/motor.stl" ]
                    }
                  }
                ] 
              }

            DEF FRONT_LEFT Propeller {
                shaftAxis 0 0 1
                    centerOfThrust IS prop_front_left_translation
                    thrustConstants 0 0
                    torqueConstants 0 0
                    fastHelixThreshold IS prop_fast_helix_threshold
                    device RotationalMotor {
                        name "prop_front_left"
                        maxVelocity IS motor_max_velocity
                        maxTorque IS motor_max_torque
                    }
                fastHelix Solid {
                    translation IS prop_front_left_translation
                        children [

                        Shape {
                                    appearance PBRAppearance {
                                        baseColor IS prop_color
                                            baseColorMap ImageTexture {
                                                url [
                                                    "../meshes/textures/fast_helix.png"
                                                ]
                                            }
                                        metalness 0
                                    }
                                    geometry Cylinder {
                                        height IS prop_fast_helix_height
                                        radius IS prop_fast_helix_radius
                                    }
                                }

                      
                        ] 
                }
                slowHelix DEF PROP Solid {
                    translation IS prop_front_left_translation
                    rotation IS prop_front_left_rotation
                        children [

                            Shape {

                                appearance DEF PLASTIC PBRAppearance {
                                    baseColor IS prop_color
                                        metalness 0
                                }

                              geometry Mesh {
                                  url [ "../meshes/stl_files/sevjr/prop.stl" ]
                              }
                            }

                        ]
                }
            }

            # Propeller Rear ---------------------------------------------------------

              DEF MOTOR_REAR Solid {
                translation IS motor_rear_translation
                name "motor_rear"
                children [
                  Shape {
                    appearance PBRAppearance {
                    baseColor IS motor_color
                    metalness IS motor_metalness
                  }
                    geometry Mesh {
                      url [ "../meshes/stl_files/sevjr/motor.stl" ]
                    }
                  }
                ] 
              }

            DEF REAR Propeller {
                shaftAxis 0 0 1
                    centerOfThrust IS prop_rear_translation
                    thrustConstants 0 0
                    torqueConstants 0 0
                    fastHelixThreshold IS prop_fast_helix_threshold
                    device RotationalMotor {
                        name "prop_rear"
                        maxVelocity IS motor_max_velocity
                        maxTorque IS motor_max_torque
                    }
                fastHelix Solid {
                    translation IS prop_rear_translation
                        children [

                        Shape {
                                    appearance PBRAppearance {
                                        baseColor IS prop_color
                                            baseColorMap ImageTexture {
                                                url [
                                                    "../meshes/textures/fast_helix.png"
                                                ]
                                            }
                                        metalness 0
                                    }
                                    geometry Cylinder {
                                        height IS prop_fast_helix_height
                                        radius IS prop_fast_helix_radius
                                    }
                                }

                      
                        ] 
                }
                slowHelix DEF PROP Solid {
                    translation IS prop_rear_translation
                    rotation IS prop_rear_rotation
                        children [

                            Shape {

                                appearance DEF PLASTIC PBRAppearance {
                                    baseColor IS prop_color
                                        metalness 0
                                }

                              geometry Mesh {
                                  url [ "../meshes/stl_files/sevjr/prop.stl" ]
                              }
                            }

                        ]
                }

            } # Motor rear

            # Rudder ---------------------------------------------------------

            DEF RUDDER Propeller {
                shaftAxis 1 0 0
                    centerOfThrust IS rudder_translation
                    thrustConstants 0 0
                    torqueConstants 0 0
                    device RotationalMotor {
                        name "rudder"
                        maxVelocity IS motor_max_velocity
                        maxTorque IS motor_max_torque
                    }
                slowHelix DEF PROP Solid {
                    translation IS rudder_translation
                    rotation IS rudder_rotation
                        children [

                            Shape {

                                appearance DEF PLASTIC PBRAppearance {
                                    baseColor IS rudder_color
                                        metalness 0
                                }

                              geometry Mesh {
                                  url [ "../meshes/stl_files/sevjr/rudder.stl" ]
                              }
                            }

                        ]
                }

            } # Motor rear


        ] # DEF ROBOT Robot { children [ =========================================

        boundingObject Cylinder {
            height 0.03
            radius 0.05
        }

        physics Physics {
            density -1
            mass 0.05
        }
    } # DEF ROBOT ROBOT

} 
